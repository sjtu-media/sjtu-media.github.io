zh:
  header:
    home_tooltip: 首页
    dark_mode: 深色模式
    language_switch:
      zh: 中文
      en: EN
  nav:
    news:
      label: 新闻
      tooltip: 动态、公告与亮点
    research:
      label: 研究
      tooltip: 研究方向与重点课题
    publication:
      label: 论文
      tooltip: 论文成果与引文记录
    people:
      label: 团队
      tooltip: 教师、学生、职员与校友
    contact:
      label: 联系
      tooltip: 邮箱、地址与合作方式
  home:
    kicker: 上海交通大学
    lead_suffix: 首页围绕站点五个核心栏目组织：新闻、研究、论文、团队与联系。
    body: 用实验室真实的成员、项目和论文数据替换示例内容，即可把当前骨架站点投入正式使用。
    actions:
      research: 浏览研究
      publication: 查看论文
      people: 认识团队
    stats:
      people: 人员主页
      posts: 新闻文章
      publications: 论文记录
    hero_alt: 实验室视觉占位图
    hero_caption: 将这里替换为近期团队合影、显微图像拼图或研究工作的视觉摘要。
    sections:
      kicker: 栏目概览
      title: 浏览实验室网站
      summary: 各个一级页面保持统一的视觉语言，访问者可以自然地在动态、研究、论文、团队与联系信息之间切换。
      cards:
        news:
          title: 新闻
          body: 实验室公告、活动、教程、招聘信息和论文亮点。
          cta: 打开新闻
        research:
          title: 研究
          body: 研究主题、进行中的方向、数据集、软件与重点项目。
          cta: 打开研究
        publication:
          title: 论文
          body: 自动生成的引文记录、重点论文和可搜索的论文列表。
          cta: 打开论文
        people:
          title: 团队
          body: 由 members collection 管理的教师、学生、职员与校友信息。
          cta: 打开团队
        contact:
          title: 联系
          body: 官方联系方式、办公地点以及合作咨询信息。
          cta: 打开联系
    updates:
      kicker: 最新动态
      title: 最新新闻
      summary: 突出展示最近更新，并为后续动态保留足够的浏览空间。
    research:
      kicker: 研究
      title: 研究方向
      summary: 研究内容与重点项目现在统一归入顶层 Research 页面，而不再单独拆出 Projects 栏。
      cta: 查看研究
    publication:
      kicker: 论文
      title: 最新论文
      summary: 论文页面继续保持数据驱动和可搜索，但现在作为一级导航独立存在。
      cta: 浏览论文
    people:
      kicker: 团队
      title: 团队概览
      summary: 首页的成员预览直接从 members collection 读取，因此会与 People 页面保持一致。
    contact:
      kicker: 联系
      title: 让访问者更容易联系实验室
      summary: Contact 现已成为五个一级栏目之一。请将占位内容替换为正式邮箱、办公地点以及合作或招生信息。
      actions:
        contact: 打开联系页面
        people: 查看团队
  pages:
    research:
      eyebrow: 研究
      title: 研究
      summary: 这里用于展示实验室的主要研究方向、方法、数据集、软件以及长期科学主题。
      themes_title: 研究主题
      themes_body: 用几个简短标签快速传达实验室的研究身份与方法特征。
      customize_title: 如何定制
      customize_body: 下方研究卡片由 `_data/projects.yaml` 驱动。请将示例条目替换为你们自己的研究主题、软件、数据集和合作项目。
      customize_note: 这样可以把研究方向与配套资源集中在同一页，而论文内容则放到独立的 Publication 页面。
      featured_eyebrow: 重点
      featured_title: 重点研究方向
      featured_summary: 优先展示实验室最重要的研究主题或代表性工作。
      more_eyebrow: 更多
      more_title: 资源与进行中的工作
      more_summary: 次级项目、数据集、工具和合作可以放在这里。
    publication:
      eyebrow: 论文
      title: 论文
      summary: 论文页面由 ORCID、DOI、PubMed 等来源生成的引文数据驱动。
      highlighted_eyebrow: 推荐
      highlighted_title: 代表性论文
      highlighted_summary: 顶部位置适合放最近发表或最具代表性的论文。
      search_title: 检索论文
      search_note: 更新 `_data/sources.yaml`、`_data/orcid.yaml` 等文件后，就可以用实验室真实论文列表替换示例记录。
    people:
      eyebrow: 团队
      title: 团队
      summary: People 页面由 `_members` collection 驱动。请用实验室真实的教师、学生、职员、访问学者和校友资料替换示例内容。
      leadership_eyebrow: 负责人
      leadership_title: 课题组负责人
      current_eyebrow: 当前成员
      current_title: 学生、职员与研究人员
      alumni_eyebrow: 校友
      alumni_title: 历届成员
      culture_title: 招生与团队文化
      culture_body: 这里可以写团队文化、指导方式、开放岗位或合作重点的简短说明。
    contact:
      eyebrow: 联系
      title: 联系
      summary: 这里用于展示实验室官方联系信息、办公室位置、来访路线以及合作或招生说明。
      email_title: 邮箱
      email_body: 将这里替换为实验室官方邮箱或共享行政联系方式。
      location_title: 地址
      location_body: 在这里补充楼宇、校区、城市和邮编，方便访客找到实验室。
      location_note: 上海交通大学<br>请替换为正式地址
      collaboration_title: 合作
      collaboration_body: 这里用于合作咨询、实习申请或招生说明。
      collaboration_link: GitHub 主页
      visit_title: 到访实验室
      visit_body: 在这里补充来访说明、校门出入信息或附近地标。
      visit_caption: 请替换为校园、实验室或楼宇照片。
      before_title: 联系前请准备
      before_body: 可在这里说明希望潜在学生或合作方提供的材料，例如简历、研究陈述或近期成果链接。
      before_note: 这里也可以解释团队如何处理合作咨询、实习申请或媒体联络。
    news:
      eyebrow: 新闻
      title: 新闻
      summary: 实验室的新闻、公告、招聘说明、教程以及论文亮点。
      browse_title: 浏览文章
      browse_note: 你可以搜索归档或按标签筛选。准备好之后，将 `_posts/` 中的示例文章替换为实验室自己的新闻内容。

en:
  header:
    home_tooltip: Home
    dark_mode: Dark mode
    language_switch:
      zh: ZH
      en: English
  nav:
    news:
      label: News
      tooltip: Updates, announcements, and highlights
    research:
      label: Research
      tooltip: Research areas and featured directions
    publication:
      label: Publication
      tooltip: Publications and citation records
    people:
      label: People
      tooltip: Faculty, students, staff, and alumni
    contact:
      label: Contact
      tooltip: Email, address, and collaboration details
  home:
    kicker: Shanghai Jiao Tong University
    lead_suffix: "The homepage is now organized around the five primary sections of the site: News, Research, Publication, People, and Contact."
    body: Replace the current sample members, projects, and citation sources with your lab's real records to turn this scaffold into the production website.
    actions:
      research: Explore research
      publication: View publications
      people: Meet the team
    stats:
      people: People profiles
      posts: News posts
      publications: Publication records
    hero_alt: Laboratory visual placeholder
    hero_caption: Replace this placeholder with a recent lab photo, microscopy panel, or visual summary of your work.
    sections:
      kicker: Site Sections
      title: Navigate the Lab Website
      summary: Each major part of the site follows the same visual language so visitors can move between updates, research, publications, people, and contact information without a style break.
      cards:
        news:
          title: News
          body: Announcements, events, tutorials, recruiting notes, and paper highlights from the group.
          cta: Open News
        research:
          title: Research
          body: Research themes, ongoing directions, datasets, software, and featured projects.
          cta: Open Research
        publication:
          title: Publication
          body: Auto-generated citation records, highlighted papers, and searchable publication listings.
          cta: Open Publication
        people:
          title: People
          body: Faculty, students, staff, and alumni managed from the members collection.
          cta: Open People
        contact:
          title: Contact
          body: Official contact channels, location details, and information for collaborators.
          cta: Open Contact
    updates:
      kicker: Updates
      title: Latest News
      summary: Recent posts are highlighted prominently, with enough space for one featured update and quick follow-on items.
    research:
      kicker: Research
      title: Research Directions
      summary: Research content and featured projects now live under the same top-level section rather than a separate Projects tab.
      cta: See research
    publication:
      kicker: Publication
      title: Latest Publications
      summary: The publication section remains data-driven and searchable, but now sits as its own first-class page in the navigation.
      cta: Browse publications
    people:
      kicker: People
      title: People Snapshot
      summary: Team members are surfaced directly from the members collection so the homepage stays aligned with the People page.
    contact:
      kicker: Contact
      title: Make it easy to reach the lab
      summary: The contact section is now one of the five primary site areas. Replace the placeholder details with your official lab email, office location, and collaboration or recruiting information.
      actions:
        contact: Open contact page
        people: View people
  pages:
    research:
      eyebrow: Research
      title: Research
      summary: This page is for the lab's main research directions, methods, datasets, software, and long-running scientific themes.
      themes_title: Research Themes
      themes_body: Use this section for short labels that communicate the lab's identity quickly.
      customize_title: How to Customize
      customize_body: Research cards below are driven by `_data/projects.yaml`. Replace the sample entries with your own themes, software, datasets, and collaborations.
      customize_note: This keeps research directions and supporting resources in one place while publications move to the dedicated Publication page.
      featured_eyebrow: Featured
      featured_title: Featured Research Directions
      featured_summary: Lead with the most important themes or flagship efforts of the lab.
      more_eyebrow: More
      more_title: Resources and Ongoing Work
      more_summary: Secondary projects, datasets, tools, and collaborations can live here.
    publication:
      eyebrow: Publication
      title: Publication
      summary: The publication page is driven by citation data generated from your ORCID, DOI, PubMed, and related sources.
      highlighted_eyebrow: Highlighted
      highlighted_title: Selected Publication
      highlighted_summary: Use the top slot for a recent or representative paper.
      search_title: Search Publications
      search_note: Update `_data/sources.yaml`, `_data/orcid.yaml`, and related files to replace the sample records with your lab's real publication list.
    people:
      eyebrow: People
      title: People
      summary: The People page is driven by the `_members` collection. Replace the sample profiles with your lab's faculty, students, staff, visiting scholars, and alumni.
      leadership_eyebrow: Leadership
      leadership_title: Principal Investigator
      current_eyebrow: Current Members
      current_title: Students, Staff, and Researchers
      alumni_eyebrow: Alumni
      alumni_title: Past Members
      culture_title: Recruiting and Culture
      culture_body: Use this area for a short statement about the group's culture, mentoring style, open positions, or collaboration priorities.
    contact:
      eyebrow: Contact
      title: Contact
      summary: Use this page for the lab's official contact information, office location, directions, and collaboration or recruiting details.
      email_title: Email
      email_body: Replace this placeholder with the lab's official email or shared administrative contact.
      location_title: Location
      location_body: Add the building, campus, city, and postal code here so visitors can find the lab.
      location_note: Shanghai Jiao Tong University<br>Replace with official address
      collaboration_title: Collaboration
      collaboration_body: Use this block for collaboration inquiries, internship applications, or recruitment instructions.
      collaboration_link: GitHub profile
      visit_title: Visit the Lab
      visit_body: Share visitor instructions, campus entry notes, or nearby landmarks here.
      visit_caption: Replace with a campus, lab, or building photo.
      before_title: Before You Reach Out
      before_body: List the materials you want from prospective students or collaborators, such as a CV, research statement, or links to recent work.
      before_note: This section can also explain how the group handles project inquiries, internships, or media requests.
    news:
      eyebrow: News
      title: News
      summary: News, announcements, recruiting notes, tutorials, and paper highlights from the lab.
      browse_title: Browse Posts
      browse_note: Search the archive or filter by tags. Replace the sample posts in `_posts/` with your own news items when ready.
