<!DOCTYPE html>
<html lang="{{ page.lang | default: 'zh' }}">
  <head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <link rel="canonical" href="{{ page.redirect_path | relative_url }}">
    <script>
      window.location.replace("{{ page.redirect_path | relative_url }}");
    </script>
    <meta http-equiv="refresh" content="0; url={{ page.redirect_path | relative_url }}">
    <meta name="robots" content="noindex">
  </head>
  <body>
    <h1>Redirecting…</h1>
    <a href="{{ page.redirect_path | relative_url }}">Click here if you are not redirected.</a>
  </body>
</html>
